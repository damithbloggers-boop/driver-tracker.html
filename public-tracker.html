<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>කසළ රථය කොහෙද? — ඉබ්බාගමුව ප්‍රාදේශීය සභාව</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --asphalt:#1c2321;
    --asphalt-2:#242b28;
    --paper:#eeeee6;
    --paper-dim:#9aa39d;
    --line:#3a423e;
    --green:#4c9a4c;
    --green-dim:#2e5c34;
    --amber:#e8a33d;
    --amber-dim:#7a5a22;
    --teal:#3f9c94;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--asphalt); color:var(--paper);
    font-family:'Noto Sans Sinhala','IBM Plex Mono',sans-serif;
    min-height:100vh;
  }

  header{
    padding:16px 18px; text-align:center;
    background:repeating-linear-gradient(135deg,var(--asphalt-2) 0 10px,#20261f 10px 20px);
    border-bottom:3px solid var(--amber);
  }
  header h1{font-size:17px; font-weight:700;}
  header span{display:block; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--paper-dim); letter-spacing:0.06em; margin-top:4px;}

  .status-strip{
    display:flex; overflow-x:auto; gap:8px; padding:12px 14px;
    background:var(--asphalt-2); border-bottom:1px solid var(--line);
  }
  .status-pill{
    flex-shrink:0; display:flex; align-items:center; gap:6px;
    background:var(--asphalt); border:1px solid var(--line); border-radius:20px;
    padding:6px 12px; font-size:11.5px; white-space:nowrap;
  }
  .status-pill .dot{width:7px; height:7px; border-radius:50%; background:var(--teal);}
  .status-pill.idle .dot{background:var(--paper-dim);}

  #map{width:100%; height:56vh;}

  .leaflet-popup-content-wrapper{
    background:var(--asphalt-2); color:var(--paper); border:1px solid var(--line); border-radius:6px;
    font-family:'Noto Sans Sinhala',sans-serif; font-size:12.5px;
  }
  .leaflet-popup-tip{background:var(--asphalt-2);}
  .leaflet-control-attribution{background:rgba(28,35,33,0.8) !important; color:var(--paper-dim) !important; font-size:9px !important;}
  .leaflet-control-zoom a{background:var(--asphalt-2) !important; color:var(--paper) !important; border-color:var(--line) !important;}

  .veh-pulse{
    width:18px; height:18px; border-radius:50%; background:var(--teal);
    border:2px solid #0e1a18;
    box-shadow:0 0 0 0 rgba(63,156,148,0.7);
    animation:vehpulse 1.8s infinite;
  }
  @keyframes vehpulse{
    0%{box-shadow:0 0 0 0 rgba(63,156,148,0.6);}
    70%{box-shadow:0 0 0 16px rgba(63,156,148,0);}
    100%{box-shadow:0 0 0 0 rgba(63,156,148,0);}
  }
  .user-pulse{
    width:20px; height:20px; border-radius:50%; background:#4a90e2;
    border:3px solid #ffffff;
    box-shadow:0 0 0 0 rgba(74,144,226,0.7);
    animation:userpulse 1.8s infinite;
  }
  @keyframes userpulse{
    0%{box-shadow:0 0 0 0 rgba(74,144,226,0.6);}
    70%{box-shadow:0 0 0 16px rgba(74,144,226,0);}
    100%{box-shadow:0 0 0 0 rgba(74,144,226,0);}
  }

  .list-wrap{padding:16px 14px 40px;}
  .list-title{
    font-family:'Archivo Narrow',sans-serif; font-size:13px; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--paper-dim); margin-bottom:10px;
    border-bottom:1px solid var(--line); padding-bottom:6px;
  }
  .zone-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:11px 12px; border:1px solid var(--line); border-left:4px solid var(--line);
    border-radius:4px; margin-bottom:7px; background:var(--asphalt-2);
  }
  .zone-row.status-done{border-left-color:var(--green);}
  .zone-row.status-pending{border-left-color:var(--amber);}
  .zone-row .name{font-size:13px;}
  .badge{
    font-family:'IBM Plex Mono',monospace; font-size:10px; padding:3px 9px; border-radius:12px;
    letter-spacing:0.04em; white-space:nowrap;
  }
  .badge.pending{background:var(--amber-dim); color:var(--amber);}
  .badge.done{background:var(--green-dim); color:var(--green);}

  .proximity-card{
    margin:0 14px 14px; padding:16px; border-radius:10px;
    background:var(--asphalt-2); border:1px solid var(--line);
    display:none;
  }
  .proximity-card.show{display:block;}
  .proximity-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;}
  .proximity-vehicle{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--paper-dim); letter-spacing:0.05em;}
  .proximity-trend{font-size:11px; font-weight:600; display:flex; align-items:center; gap:4px;}
  .proximity-trend.closer{color:var(--green);}
  .proximity-trend.farther{color:var(--amber);}
  .proximity-trend.same{color:var(--paper-dim);}
  .proximity-dist{
    font-family:'IBM Plex Mono',monospace; font-size:32px; font-weight:600; color:var(--paper);
    display:flex; align-items:baseline; gap:6px; margin-bottom:12px;
  }
  .proximity-dist small{font-size:14px; color:var(--paper-dim); font-weight:400;}
  .proximity-bar-track{
    width:100%; height:10px; border-radius:5px; background:var(--asphalt);
    border:1px solid var(--line); overflow:hidden; position:relative;
  }
  .proximity-bar-fill{
    height:100%; border-radius:5px;
    background:linear-gradient(90deg, var(--amber), var(--teal), var(--green));
    transition:width 1s ease-out;
  }
  .proximity-bar-labels{
    display:flex; justify-content:space-between; margin-top:6px;
    font-size:9.5px; color:var(--paper-dim); font-family:'IBM Plex Mono',monospace;
  }
  .proximity-close-badge{
    display:inline-block; margin-top:10px; padding:5px 12px; border-radius:14px;
    background:var(--green-dim); color:var(--green); font-size:11.5px; font-weight:600;
  }

  footer{
    text-align:center; padding:14px; font-size:9.5px; color:var(--paper-dim);
    font-family:'IBM Plex Mono',monospace; letter-spacing:0.04em; border-top:1px solid var(--line);
  }

  .note{
    font-size:11px; color:var(--paper-dim); text-align:center; padding:10px 20px;
    line-height:1.6; font-family:'IBM Plex Mono',monospace;
  }
</style>
</head>
<body>

<header>
  <h1>🚛 කසළ රථය කොහෙද?</h1>
  <span>IBBAGAMUWA PRADESHIYA SABHA · WASTE COLLECTION TRACKER</span>
</header>

<div class="status-strip" id="statusStrip"></div>

<div id="map"></div>

<p class="note">වාහනයේ සජීවී ස්ථානය මෙතන පෙන්වයි. teal line එක ගමන් කරපු මාර්ගය පෙන්වයි.</p>

<div style="text-align:center; padding:0 14px 14px;">
  <button id="locateBtn" style="
    background:var(--teal); color:#0e1a18; border:none; border-radius:20px;
    padding:10px 20px; font-family:'Noto Sans Sinhala',sans-serif; font-weight:600;
    font-size:13px; cursor:pointer;">📍 මගේ ස්ථානය පෙන්වන්න</button>
</div>

<div class="proximity-card" id="proximityCard">
  <div class="proximity-top">
    <span class="proximity-vehicle" id="proximityVehicle">—</span>
    <span class="proximity-trend" id="proximityTrend"></span>
  </div>
  <div class="proximity-dist"><span id="proximityDistValue">—</span><small>km ඈතින්</small></div>
  <div class="proximity-bar-track">
    <div class="proximity-bar-fill" id="proximityBarFill" style="width:0%"></div>
  </div>
  <div class="proximity-bar-labels"><span>ඈත</span><span>ළඟ</span></div>
  <div id="proximityCloseBadge"></div>
</div>

<div class="list-wrap">
  <div class="list-title">ඔබේ ප්‍රදේශයේ ස්ථාන</div>
  <div id="zoneList"></div>
</div>

<footer>SANITATION OPS · PUBLIC VIEW · UPDATES EVERY 10S</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxNRiG-GksPRnJ8l9Kl5CtTArbM1jdv8PR35u4DXk8r57L1FGwdO1YuY1NF_xTSlkalPQ/exec";
// vehicle IDs are discovered dynamically from the sheet — no fixed list needed
const OFFLINE_AFTER_MS = 2 * 60 * 1000;

const zones = [
  {id:"Z01", name:"Abepussa - Kurunegala - Thrincomale Road", lat:7.61586, lng:80.48569, status:"done"},
  {id:"Z02", name:"Nabiriththewewa - Mukalanyaya Road", lat:7.60901, lng:80.40254, status:"pending"},
  {id:"Z03", name:"Ibbagamuwa - Kumbukgete - Madagalla", lat:7.61765, lng:80.43360, status:"pending"},
  {id:"Z04", name:"Kumbukgete - Lenawa Road", lat:7.68185, lng:80.45498, status:"pending"},
  {id:"Z05", name:"Ganewatta - Nagollagama Road", lat:7.68257, lng:80.31266, status:"pending"},
  {id:"Z06", name:"Ganewatta - Kumbukgete Road", lat:7.65442, lng:80.37640, status:"done"},
  {id:"Z07", name:"Melsiripura - Kumbukwewa Road", lat:7.62991, lng:80.46679, status:"pending"},
  {id:"Z08", name:"Maiwela - Diddeniya Road", lat:7.66671, lng:80.48250, status:"done"},
  {id:"Z09", name:"Bathalagoda Ela Bant Road", lat:7.51263, lng:80.45289, status:"done"},
  {id:"Z10", name:"Muththettugala - Hiripitiya Road", lat:7.62375, lng:80.37099, status:"pending"},
  {id:"Z11", name:"Pannala - Mukalanyaya Road", lat:7.56356, lng:80.43185, status:"pending"},
  {id:"Z12", name:"Manapaha - Bannekgama Road", lat:7.64516, lng:80.41630, status:"pending"},
  {id:"Z13", name:"Melsiripura - Rabee Road", lat:7.66931, lng:80.50425, status:"done"},
  {id:"Z14", name:"Pausi Salinda Mawatha Road", lat:7.68775, lng:80.34183, status:"pending"},
  {id:"Z15", name:"Melsiripura - Millawana Road", lat:7.63692, lng:80.53214, status:"pending"},
  {id:"Z16", name:"Yakalla - Mukalanyaya Road", lat:7.54226, lng:80.41815, status:"pending"},
];

const map = L.map('map', {zoomControl:true}).setView([7.635, 80.42], 12);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles &copy; Esri', maxZoom: 19
}).addTo(map);

fetch('roads.geojson')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(geo => {
    L.geoJSON(geo, { style: {color:'#d4ff3f', weight: 2, opacity: 0.6} }).addTo(map);
  })
  .catch(()=>{});

function statusLabel(s){ return s === "done" ? "රැස් කරන ලදී" : "පොරොත්තුවෙන්"; }
zones.forEach(z=>{
  const color = z.status === 'done' ? '#4c9a4c' : '#e8a33d';
  L.circleMarker([z.lat, z.lng], {radius:8, color, weight:2, fillColor:color, fillOpacity:0.55})
    .addTo(map)
    .bindPopup(`<b>${z.name}</b><br>තත්ත්වය: ${statusLabel(z.status)}`);
});

function renderZoneList(){
  const el = document.getElementById('zoneList');
  el.innerHTML = "";
  zones.forEach(z=>{
    const row = document.createElement('div');
    row.className = `zone-row status-${z.status}`;
    row.innerHTML = `
      <span class="name">${z.name}</span>
      <span class="badge ${z.status}">${statusLabel(z.status)}</span>
    `;
    el.appendChild(row);
  });
}

// Round coordinates to ~500m precision so exact driver position isn't exposed publicly
function roundApprox(v){ return Math.round(v * 200) / 200; }

const vehMarkers = {};
const vehTrails = {};   // polyline per vehicle
const vehPaths = {};    // accumulated points per vehicle
let userMarker = null;
let userLatLng = null;
const vehIcon = ()=> L.divIcon({className:'', html:'<div class="veh-pulse"></div>', iconSize:[18,18], iconAnchor:[9,9]});
const userIcon = ()=> L.divIcon({className:'', html:'<div class="user-pulse"></div>', iconSize:[20,20], iconAnchor:[10,10]});

function haversineKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

document.getElementById('locateBtn').addEventListener('click', ()=>{
  if(!navigator.geolocation){
    alert("මෙම browser එකේ location සහාය නොදක්වයි.");
    return;
  }
  navigator.geolocation.getCurrentPosition((pos)=>{
    userLatLng = {lat: pos.coords.latitude, lng: pos.coords.longitude};
    if(userMarker){
      userMarker.setLatLng([userLatLng.lat, userLatLng.lng]);
    }else{
      userMarker = L.marker([userLatLng.lat, userLatLng.lng], {icon: userIcon()})
        .addTo(map).bindPopup("<b>ඔබ මෙතන ඉන්නවා</b>");
    }
    map.setView([userLatLng.lat, userLatLng.lng], 14);
    updateDistanceNote();
  }, ()=>{
    alert("ස්ථානය ලබාගත නොහැක. Location permission එකට Allow ඔබන්න.");
  }, {enableHighAccuracy:true, timeout:15000});
});

let prevDistanceKm = null;
let connectLine = null;
const MAX_RANGE_KM = 5; // bar visualization range

function updateDistanceNote(){
  const card = document.getElementById('proximityCard');
  if(!userLatLng || Object.keys(vehMarkers).length === 0){
    card.classList.remove('show');
    if(connectLine){ map.removeLayer(connectLine); connectLine = null; }
    return;
  }
  let nearest = null, nearestDist = Infinity, nearestLL = null;
  for(const vid in vehMarkers){
    const ll = vehMarkers[vid].getLatLng();
    const d = haversineKm(userLatLng.lat, userLatLng.lng, ll.lat, ll.lng);
    if(d < nearestDist){ nearestDist = d; nearest = vid; nearestLL = ll; }
  }
  if(!nearest) return;

  card.classList.add('show');
  document.getElementById('proximityVehicle').textContent = `🚛 ${nearest}`;

  // distance display
  const distEl = document.getElementById('proximityDistValue');
  const distLabel = card.querySelector('.proximity-dist small');
  if(nearestDist < 1){
    distEl.textContent = Math.round(nearestDist * 1000);
    distLabel.textContent = "m ඈතින්";
  }else{
    distEl.textContent = nearestDist.toFixed(1);
    distLabel.textContent = "km ඈතින්";
  }

  // proximity bar (closer = more filled)
  const pct = Math.max(0, Math.min(100, 100 - (nearestDist / MAX_RANGE_KM) * 100));
  document.getElementById('proximityBarFill').style.width = pct + "%";

  // trend (closer / farther / same since last check)
  const trendEl = document.getElementById('proximityTrend');
  if(prevDistanceKm !== null){
    const diff = nearestDist - prevDistanceKm;
    if(diff < -0.02){
      trendEl.textContent = "↓ ළං වෙනවා";
      trendEl.className = "proximity-trend closer";
    }else if(diff > 0.02){
      trendEl.textContent = "↑ ඈත් වෙනවා";
      trendEl.className = "proximity-trend farther";
    }else{
      trendEl.textContent = "— වෙනසක් නෑ";
      trendEl.className = "proximity-trend same";
    }
  }
  prevDistanceKm = nearestDist;

  // close badge
  const badgeEl = document.getElementById('proximityCloseBadge');
  badgeEl.innerHTML = nearestDist < 0.3 ? `<span class="proximity-close-badge">📍 ළඟටම ආවා!</span>` : "";

  // connecting line between user and nearest vehicle
  if(connectLine){
    connectLine.setLatLngs([[userLatLng.lat, userLatLng.lng], nearestLL]);
  }else{
    connectLine = L.polyline([[userLatLng.lat, userLatLng.lng], nearestLL], {
      color:'#4a90e2', weight:2, opacity:0.6, dashArray:'6 6'
    }).addTo(map);
  }
}

async function pollDrivers(){
  let activeCount = 0;
  let driverRows = [];
  try{
    const res = await fetch(API_URL, {cache:"no-store"});
    driverRows = await res.json();
  }catch(err){ console.error(err); }

  const strip = document.getElementById('statusStrip');
  strip.innerHTML = "";
  const seenVehicles = [];

  for(const raw of driverRows){
    if(!raw.vehicleId) continue;
    const vid = raw.vehicleId;
    const lat = raw.lat === "" ? null : Number(raw.lat);
    const lng = raw.lng === "" ? null : Number(raw.lng);
    const updatedAt = Number(raw.updatedAt);
    const isFresh = raw.status === "active" && (Date.now() - updatedAt) < OFFLINE_AFTER_MS;

    if(isFresh && lat != null){
      activeCount++;
      const aLat = lat, aLng = lng; // exact GPS position (driver name is still hidden in the popup)
      if(vehMarkers[vid]){
        vehMarkers[vid].setLatLng([aLat, aLng]);
      }else{
        vehMarkers[vid] = L.marker([aLat, aLng], {icon: vehIcon()}).addTo(map);
      }
      vehMarkers[vid].bindPopup(`<b>${vid}</b><br>දැනට මාර්ගයේ ක්‍රියාත්මකයි`);
      seenVehicles.push(vid);

      // update trail (only add a point if it's different from the last one)
      if(!vehPaths[vid]) vehPaths[vid] = [];
      const last = vehPaths[vid][vehPaths[vid].length - 1];
      if(!last || last[0] !== aLat || last[1] !== aLng){
        vehPaths[vid].push([aLat, aLng]);
      }
      if(!vehTrails[vid]){
        vehTrails[vid] = L.polyline(vehPaths[vid], {color:'#3f9c94', weight:3, opacity:0.7}).addTo(map);
      }else{
        vehTrails[vid].setLatLngs(vehPaths[vid]);
      }
    }else if(vehMarkers[vid]){
      map.removeLayer(vehMarkers[vid]);
      delete vehMarkers[vid];
    }
  }

  if(seenVehicles.length === 0){
    strip.innerHTML = `<div class="status-pill idle"><span class="dot"></span>දැනට කිසිම කසළ රථයක් ක්‍රියාත්මක නෑ</div>`;
  }else{
    seenVehicles.forEach(vid=>{
      strip.innerHTML += `<div class="status-pill"><span class="dot"></span>${vid} · මාර්ගයේ ක්‍රියාත්මකයි</div>`;
    });
  }
  updateDistanceNote();
}

renderZoneList();
pollDrivers();
setInterval(pollDrivers, 10000);
</script>
</body>
</html>
